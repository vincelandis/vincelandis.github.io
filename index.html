<html>

  <body>
  <div id="contentArea">
    <div id="buttonGroup">
      <span id="menuTitle">Vince Landis, Developer</span>
      <div class="menuButton" id="button1">Mobile Applications</div>
      <div class="menuButton" id="button2">HTML5</div>
      <div class="menuButton" id="button3">C++</div>
      <div class="menuButton" id="button4">C</div>
      <div class="menuButton" id="button5">About</div>
      <div class="menuButton" id="button6">Java</div>
      <div class="menuButton" id="button7">Contact Info</div>
    </div>
    <br class="clearBoth"/>
    <div id="tabView">
      <a target="_blank" href="https://play.google.com/store/apps/details?id=com.mike.vamoslionchariot&hl=en">
        <div class="floatLeft appInfoLink1">Vamos! Lion for Android

      <a target="_blank" href="https://play.google.com/store/">
        <div class="floatLeft appInfoLink2">Pac-rush for Android

          <br />
          <span class="floatRight smallerText">View in Google Play Store ></span>
        </div>
      </a>
    </div>
  </div>

</html>

<style>
a:visited {color: #9A5623;}
a:link {color: black;}
body {
  background: url(images/background.png) top no-repeat;
  background-attachment:fixed;
}
#contentArea {
  height: 1250px;
  margin-top: 14px;
  margin-bottom: 14px;
  margin-left: 6px;
  margin-right: 6px;
  background-color: white;
  opacity: 0.75;
  border-radius: 5px;
  font-family: "Lucida Sans Unicode", "Lucida Grande", sans-serif;
}
#menuTitle {
  margin-top: 10px;
  margin-left: 15px;
  float: left;
  color: #9A5623;
  font-weight: 600;
}
.menuButton {
  margin-top: 10px;
  margin-left: 15px;
  padding-left: 15px;
  padding-right: 15px;
  float: left;
  height: 22px;
  font-size: 15px;
  background-color: #9A5623;
  color: white;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
}
#button1 {
  height: 36px;
  background: #FF541F;
}
#tabView {
  height: 1200px;
  margin-top: -8px;
  margin-bottom: 14px;
  margin-left: 6px;
  margin-right: 6px;
  background-color: #FF541F;
  border-radius: 5px;
}
.appInfoLink1 {
  width: 350px;
  text-align: center;
  margin-left: 25px;
  margin-top: 20px;
  clear: both;
  background: white;
  color: black;
  cursor: pointer;
  float: left;
  border-radius: 8px;
}
.appInfoLink2 {
  width: 350px;
  text-align: center;
  margin-left: 25px;
  margin-top: 20px;
  clear: both;
  background: black;
  color: white;
  cursor: pointer;
  float: left;
  border-radius: 8px;
}
.gradientHoriz {
  background: -webkit-linear-gradient(left, purple, black); /* For Safari 5.1 to 6.0 */
  background: -o-linear-gradient(right, purple, black);     /* For Opera 11.1 to 12.0 */
  background: -moz-linear-gradient(right, purple, black);   /* For Firefox 3.6 to 15 */
  background: linear-gradient(to right, purple, black);     /* Standard syntax */
  height: 50px;
}
.gradientVertical {
  background: -webkit-linear-gradient(black, white); /* For Safari 5.1 to 6.0 */
  background: -o-linear-gradient(black, white);      /* For Opera 11.1 to 12.0 */
  background: -moz-linear-gradient(black, white);    /* For Firefox 3.6 to 15 */
  background: linear-gradient(black, white);         /* Standard syntax */
}
.highlighted {background: #FF541F;}
.floatRight {float: right;}
.floatLeft {float: left;}
.clearBoth {clear: both;}
.smallerText {font-size: smaller;}
</style>

<script>
var buttonCount = 7;
var defaultButtonColor = "#9A5623";

document.addEventListener("DOMContentLoaded", function() {
  
  for (var i = 1; i <= buttonCount; i++) {
    document.getElementById("button" + i).addEventListener("click", chooseMenuTab, false);
  }

}, false);

function chooseMenuTab(e) {
  var buttonNum = e.target.id.charAt(6);

  for (var i = "1"; i <= buttonCount.toString(); i++) {
    var newColor = (buttonNum == i) ? "#FF541F" : defaultButtonColor;
    var newHeight = (buttonNum == i) ? 36 : 22;
    
    document.getElementById("button" + i).style.backgroundColor = newColor;
    document.getElementById("button" + i).style.height = newHeight;
  }
}
</script>
