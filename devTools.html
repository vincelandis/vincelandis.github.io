<html>
  <head>
    <title>Vince Landis</title>
    <link rel="icon" href="images/vincelandis.ico">

    <link rel="stylesheet" type="text/css" href="styles/vincelandis.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script src="scripts/contacts.jsonp"></script>
    <script src="scripts/vincelandis.js"></script>
  </head>
  <body class="z0">
    <div id="titleBar">
      <div id="pageTitle">
        <a href="index.html" id="homeLink">
          <span class="largeText">Vincent Landis, Developer</span>
        </a>
      </div>
      <div class="spacer floatLeft"></div>
      <a href="devTools.html" title="Best resources for Web Development" class="mediumText menuTab floatLeft">
        Developer Tools
      </a>
      <div class="spacer floatLeft"></div>
      
      <div id="searchCase" class="color3 floatRight">
        <div id="innerCase" class="color1">
          <input id="searchBar" class="color1 floatLeft" placeholder="Search this site"/>
          <div id="magnifying-glass"></div>
        </div>
      </div>
    </div>
    <div id="socialMediaPopup"></div>

    
    <div id="displayArea">
      <div id="menuSide" class="color3 floatLeft">
        <div class="menuOption color2">Number conversion</div>
        <div class="menuOption">CSS Shape generator</div>
        <div class="menuOption">Color picker</div>
        <div class="menuOption">Unicode Characters</div>
      </div>
      <div id="contentSide" class="color2 floatLeft">
        <div id="toolSpace">

          <div id="numberConversion" class="tool">
            <span class="toolText">input type: </span>
            <select id="inType">
              <option value="2">binary</option>
              <option value="4">quaternary</option>
              <option value="8">octal</option>
              <option value="10">decimal</option>
              <option value="16">hex</option>
            </select>
            <br />
            <textarea id="input" class="toolTextBox" type="text"></textarea>
            <br />
            <button id="convertButton" class="button color2">Convert</button>
            <br />
            <span class="toolText">output type: </span>
            <select id="outType">
              <option value="2">binary</option>
              <option value="4">quaternary</option>
              <option value="8">octal</option>
              <option selected=true value="10">decimal</option>
              <option value="16">hex</option>
            </select>
            <br />
            <textarea id="output" class="toolTextBox" type="text"></textarea>
            <br />
          </div>

          <div id="shapeGenerator" class="tool hidden">
            <div id="shapesTabBar">
              <div class="shapeTab">Circle</div>
              <div class="shapeTab">Triangle</div>
              <div class="shapeTab">Heart</div>
            </div>
            <div id="shapesArea">
            </div>
          </div>

        </div>
      </div>
    </div>
    
    <div id="searchArea">
      Search results:
      <br/>
      <br/>
      Nothing found
    </div>

  </body>
</html>
